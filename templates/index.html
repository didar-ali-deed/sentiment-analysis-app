<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sentiment Analyzer</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0f0f11;
            --surface: #18181c;
            --border: #2a2a32;
            --accent: #7c6af7;
            --accent2: #f76a8a;
            --text: #e8e8ef;
            --muted: #7a7a8a;
            --pos: #4ade80;
            --neg: #f87171;
            --radius: 14px;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        /* Subtle grid background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(124, 106, 247, .04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(124, 106, 247, .04) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }

        .card {
            position: relative;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2.5rem;
            width: 100%;
            max-width: 560px;
            box-shadow: 0 0 60px rgba(124, 106, 247, .08);
        }

        h1 {
            font-family: 'DM Serif Display', serif;
            font-size: 2rem;
            letter-spacing: -.5px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: .4rem;
        }

        .subtitle {
            color: var(--muted);
            font-size: .9rem;
            margin-bottom: 2rem;
        }

        label {
            display: block;
            font-size: .8rem;
            font-weight: 600;
            letter-spacing: .08em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: .5rem;
        }

        textarea {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 1rem;
            padding: .9rem 1rem;
            resize: vertical;
            min-height: 110px;
            outline: none;
            transition: border-color .2s;
        }

        textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(124, 106, 247, .15);
        }

        textarea::placeholder {
            color: var(--muted);
        }

        button[type="submit"] {
            margin-top: 1rem;
            width: 100%;
            padding: .85rem;
            background: linear-gradient(135deg, var(--accent), #5b4fd4);
            border: none;
            border-radius: var(--radius);
            color: #fff;
            font-family: 'DM Sans', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity .2s, transform .1s;
        }

        button[type="submit"]:hover {
            opacity: .9;
        }

        button[type="submit"]:active {
            transform: scale(.98);
        }

        /* Result card */
        .result {
            margin-top: 1.5rem;
            padding: 1.25rem 1.4rem;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 1.1rem;
            animation: fadeUp .35s ease;
        }

        .result.positive {
            border-color: rgba(74, 222, 128, .35);
            background: rgba(74, 222, 128, .06);
        }

        .result.negative {
            border-color: rgba(248, 113, 113, .35);
            background: rgba(248, 113, 113, .06);
        }

        .result-emoji {
            font-size: 2.2rem;
            line-height: 1;
        }

        .result-body {
            flex: 1;
        }

        .result-label {
            font-family: 'DM Serif Display', serif;
            font-size: 1.4rem;
        }

        .result.positive .result-label {
            color: var(--pos);
        }

        .result.negative .result-label {
            color: var(--neg);
        }

        .result-conf {
            font-size: .82rem;
            color: var(--muted);
            margin-top: .15rem;
        }

        /* Confidence bar */
        .bar-track {
            height: 4px;
            background: var(--border);
            border-radius: 99px;
            margin-top: .6rem;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            border-radius: 99px;
            transition: width .6s ease;
        }

        .positive .bar-fill {
            background: var(--pos);
        }

        .negative .bar-fill {
            background: var(--neg);
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .footer {
            margin-top: 2rem;
            text-align: center;
            font-size: .75rem;
            color: var(--muted);
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>Sentiment Analyzer</h1>
        <p class="subtitle">Powered by DistilBERT · ONNX Runtime · No PyTorch</p>

        <form method="POST" action="/">
            <label for="text">Your text</label>
            <textarea id="text" name="text" placeholder="Type or paste any sentence here…"
                autofocus>{{ input_text }}</textarea>

            <button type="submit">Analyze →</button>
        </form>

        {% if result %}
        {% set cls = result.sentiment | lower %}
        <div class="result {{ cls }}">
            <span class="result-emoji">{{ result.emoji }}</span>
            <div class="result-body">
                <div class="result-label">{{ result.sentiment }}</div>
                <div class="result-conf">Confidence: {{ result.confidence }}</div>
                <div class="bar-track">
                    <div class="bar-fill" style="width: {{ result.confidence }}"></div>
                </div>
            </div>
        </div>
        {% endif %}

        <p class="footer">DistilBERT SST-2 · runs entirely on CPU</p>
    </div>
</body>

</html>
